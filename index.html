<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>バーコード照合 現場版</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
:root{
  --bg:#f7f8fb;
  --card:#ffffff;
  --text:#111827;
  --sub:#6b7280;
  --ok:#0f9d58;
  --ng:#8b0000;
  --accent:#2563eb;
  --border:#d1d5db;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI","Yu Gothic",sans-serif;
}
.wrap{
  max-width:760px;
  margin:0 auto;
  padding:12px;
}
.title{
  font-size:28px;
  font-weight:800;
  text-align:center;
  margin:4px 0 12px;
}
.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
  margin-bottom:12px;
}
.status{
  font-size:18px;
  font-weight:800;
  text-align:center;
  margin-bottom:8px;
}
.big{
  font-size:64px;
  font-weight:900;
  text-align:center;
  min-height:84px;
  line-height:1.1;
  margin:8px 0;
}
.ok{color:var(--ok)}
.ng{color:var(--ng)}
.neutral{color:var(--text)}

.big.ng{
  color:#8b0000;
  background:#ffe5e5;
  border:3px solid #8b0000;
  border-radius:14px;
}

.big.ok{
  background:#e9fff1;
  border:3px solid #0f9d58;
  border-radius:14px;
}

.steps{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px 0 8px;
}
.step{
  border:2px solid var(--border);
  border-radius:16px;
  padding:12px;
  text-align:center;
  font-size:18px;
  font-weight:800;
  background:#fff;
}
.step.active{
  border-color:var(--accent);
  background:#eff6ff;
}
.code-box{
  background:#f3f4f6;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
}
.label{
  font-size:14px;
  color:var(--sub);
  margin-bottom:4px;
}
.value{
  font-size:22px;
  font-weight:700;
  min-height:28px;
  word-break:break-all;
}
.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}
.controls2{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:12px;
}
button{
  appearance:none;
  border:0;
  border-radius:16px;
  padding:16px 12px;
  font-size:18px;
  font-weight:800;
  background:var(--accent);
  color:#fff;
}
button.secondary{background:#4b5563}
button.warn{background:#b91c1c}
button:disabled{opacity:.55}

.reader-inline{
  margin-top:12px;
}
#reader{
  width:100%;
  overflow:hidden;
  border-radius:16px;
  min-height:220px;
  background:#000;
  position:relative;
}
#reader video{
  width:100% !important;
  height:auto !important;
  display:block;
  border-radius:16px !important;
}

/* ガイド */
.scan-guide{
  position:relative;
}
.scan-guide::after{
  content:"";
  position:absolute;
  left:6%;
  top:50%;
  width:88%;
  height:96px;
  transform:translateY(-48px);
  border:3px solid rgba(37,99,235,.95);
  border-radius:12px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.18);
  pointer-events:none;
}

.switches{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:12px;
}
.switch{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  background:#fff;
  font-size:17px;
  font-weight:700;
}
.hint{
  font-size:14px;
  color:var(--sub);
  line-height:1.7;
  margin-top:10px;
}
.history-title{
  font-size:18px;
  font-weight:800;
}
.history-wrap{
  max-height:260px;
  overflow:auto;
  border:1px solid var(--border);
  border-radius:14px;
  margin-top:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}
th,td{
  padding:10px 8px;
  border-bottom:1px solid #e5e7eb;
  font-size:14px;
  text-align:left;
  vertical-align:top;
}
th{
  position:sticky;
  top:0;
  background:#f9fafb;
  z-index:1;
}
.small{
  font-size:12px;
  color:var(--sub);
}
.debug{
  margin-top:10px;
  font-size:13px;
  color:#374151;
  background:#f8fafc;
  border:1px dashed #cbd5e1;
  border-radius:12px;
  padding:10px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">バーコード照合 現場版</div>

  <div class="panel">
    <div id="statusText" class="status">① リスト側を読み取ってください</div>
    <div id="resultText" class="big neutral">待機中</div>

    <div class="steps">
      <div id="step1" class="step active">① リスト側</div>
      <div id="step2" class="step">② 商品側</div>
    </div>

    <div class="code-box">
      <div class="label">1回目</div>
      <div id="code1View" class="value"></div>
    </div>

    <div class="code-box">
      <div class="label">2回目</div>
      <div id="code2View" class="value"></div>
    </div>

    <div class="controls">
      <button id="startBtn">カメラ開始</button>
      <button id="resetBtn" class="secondary">リセット</button>
    </div>

    <div class="controls2">
      <button id="exportBtn" class="secondary">履歴CSV</button>
      <button id="clearHistoryBtn" class="warn">履歴削除</button>
      <button id="toggleCameraBtn" class="secondary">停止/再開</button>
    </div>

    <div class="reader-inline">
      <div id="reader" class="scan-guide"></div>
    </div>

    <div class="switches">
      <div class="switch">
        <span>連続スキャン</span>
        <input type="checkbox" id="continuousMode" checked />
      </div>
      <div class="switch">
        <span>音を鳴らす</span>
        <input type="checkbox" id="soundMode" checked />
      </div>
      <div class="switch">
        <span>バイブ</span>
        <input type="checkbox" id="vibrationMode" checked />
      </div>
      <div class="switch">
        <span>自動リセット秒</span>
        <input type="number" id="resetSeconds" min="1" max="10" value="2" style="width:72px;font-size:18px" />
      </div>
    </div>

    <div class="hint">
      読み取り枠の中に、対象バーコード <b>1本だけ</b> を入れてください。<br>
      横長バーコード専用に調整しています。上下左右の別バーコードは枠外へ逃がしてください。<br>
      GS1-128 は <b>(01)</b> の後ろの14桁を取り出して比較します。<br>
      Code39 の <b>*</b> は比較前に自動で取り除きます。
    </div>

    <div id="debugBox" class="debug" style="display:none;"></div>
  </div>

  <div class="panel">
    <details>
      <summary class="history-title">履歴を表示</summary>
      <div class="history-wrap">
        <table id="historyTable">
          <thead>
            <tr><th>時刻</th><th>1回目</th><th>2回目</th><th>結果</th></tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
      <div class="small" style="margin-top:8px">履歴はこの端末に保存されます。</div>
    </details>
  </div>
</div>

<script>
let scanner = null;
let scanStep = 1;
let code1 = "";
let code2 = "";
let cameraRunning = false;
let processingLock = false;

let candidateValue = "";
let candidateCount = 0;
let lastAcceptedValue = "";
let blockSameUntil = 0;
let pauseUntil = 0;

const REQUIRED_STABLE_HITS = 2;      // 同じ値が連続2回出たら採用
const SAME_VALUE_BLOCK_MS = 2500;    // 同じバーコードの再読防止
const ACCEPT_PAUSE_MS = 1200;        // 採用後の全体クールダウン

const STORAGE_KEY = "barcode_check_history_v3";

const statusText = document.getElementById("statusText");
const resultText = document.getElementById("resultText");
const code1View = document.getElementById("code1View");
const code2View = document.getElementById("code2View");
const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");
const exportBtn = document.getElementById("exportBtn");
const clearHistoryBtn = document.getElementById("clearHistoryBtn");
const toggleCameraBtn = document.getElementById("toggleCameraBtn");
const continuousMode = document.getElementById("continuousMode");
const soundMode = document.getElementById("soundMode");
const vibrationMode = document.getElementById("vibrationMode");
const resetSeconds = document.getElementById("resetSeconds");
const historyBody = document.getElementById("historyBody");
const debugBox = document.getElementById("debugBox");

function nowText() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  const s = String(d.getSeconds()).padStart(2, "0");
  return y + "-" + m + "-" + da + " " + h + ":" + mi + ":" + s;
}

function normalize(code) {
  if (!code) return "";
  let t = String(code).trim();
  t = t.replace(/\s+/g, "");

  if (t.startsWith("*")) t = t.slice(1);
  if (t.endsWith("*")) t = t.slice(0, -1);

  // GS1-128 "(01)xxxxxxxxxxxxxx"
  let m = t.match(/\(01\)(\d{14})/);
  if (m) return m[1];

  // GS1-128 "01xxxxxxxxxxxxxx"
  m = t.match(/^01(\d{14})/);
  if (m) return m[1];

  return t;
}

function isLikelyValidBarcode(value) {
  if (!value) return false;

  // 英数字と一部記号のみ許可
  if (!/^[0-9A-Za-z\-\.\$\/\+\%]+$/.test(value)) return false;

  // 短すぎる値は除外
  if (value.length < 8) return false;

  // 長すぎるゴミを軽く除外
  if (value.length > 30) return false;

  return true;
}

function setStepUI() {
  if (scanStep === 1) {
    step1.classList.add("active");
    step2.classList.remove("active");
    statusText.textContent = "① リスト側を読み取ってください";
  } else {
    step1.classList.remove("active");
    step2.classList.add("active");
    statusText.textContent = "② 商品側を読み取ってください";
  }
}

function resetReadStabilizer() {
  candidateValue = "";
  candidateCount = 0;
}

function resetAll() {
  code1 = "";
  code2 = "";
  scanStep = 1;
  code1View.textContent = "";
  code2View.textContent = "";
  resultText.textContent = "待機中";
  resultText.className = "big neutral";
  processingLock = false;
  lastAcceptedValue = "";
  blockSameUntil = 0;
  pauseUntil = 0;
  resetReadStabilizer();
  setStepUI();
}

function resetSecondOnly() {
  code2 = "";
  code2View.textContent = "";
  resultText.textContent = "商品を再スキャン";
  resultText.className = "big neutral";
  resultText.style.color = "";
  resultText.style.background = "";
  resultText.style.border = "";
  scanStep = 2;
  processingLock = false;
  pauseUntil = 0;
  lastAcceptedValue = "";
  blockSameUntil = 0;
  resetReadStabilizer();
  setStepUI();
}

function vibrate(ms) {
  if (vibrationMode.checked && navigator.vibrate) navigator.vibrate(ms);
}

function beep(type) {
  if (!soundMode.checked) return;

  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();

    function tone(freq, start, duration, volume) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);

      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(volume, ctx.currentTime + start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration + 0.03);
    }

    if (type === "ok") {
      // ピンポン
      tone(1046, 0.00, 0.12, 0.06);
      tone(784,  0.16, 0.16, 0.06);
      setTimeout(() => ctx.close(), 500);

    } else if (type === "ng") {
      // ブッブー
      tone(220, 0.00, 0.14, 0.08);
      tone(220, 0.20, 0.28, 0.08);
      setTimeout(() => ctx.close(), 700);

    } else {
      // 1回目読込音
      tone(900, 0.00, 0.10, 0.05);
      setTimeout(() => ctx.close(), 250);
    }
  } catch (e) {}
}

function historyLoad() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch(e) { return []; }
}

function historySave(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function renderHistory() {
  const list = historyLoad();
  historyBody.innerHTML = "";
  list.forEach(function(row) {
    const tr = document.createElement("tr");
    tr.innerHTML = "<td>" + row.time + "</td><td>" + row.first + "</td><td>" + row.second + "</td><td>" + row.result + "</td>";
    historyBody.appendChild(tr);
  });
}

function addHistory(first, second, result) {
  const list = historyLoad();
  list.unshift({ time: nowText(), first: first, second: second, result: result });
  historySave(list);
  renderHistory();
}

function exportHistoryCsv() {
  const list = historyLoad();
  const rows = [["時刻","1回目","2回目","結果"]];
  list.forEach(function(r){ rows.push([r.time, r.first, r.second, r.result]); });

  const csv = rows.map(function(cols){
    return cols.map(function(v){
      const s = String(v || "");
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
    }).join(",");
  }).join("\n");

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "barcode_history.csv";
  a.click();
}

function showResult(ok) {
  if (ok) {
    resultText.textContent = "OK";
    resultText.className = "big ok";
    beep("ok");
    vibrate(120);
  } else {
    resultText.textContent = "NG";
    resultText.className = "big ng";
    beep("ng");
    vibrate([150, 80, 150]);
  }
}

function afterCompare(ok) {
  addHistory(code1, code2, ok ? "OK" : "NG");

  processingLock = true;
  pauseUntil = Date.now() + 1500;
  lastAcceptedValue = "";
  blockSameUntil = 0;
  resetReadStabilizer();

  const sec = Math.max(1, Math.min(10, Number(resetSeconds.value) || 2));

  if (ok) {
    if (continuousMode.checked) {
      setTimeout(function() {
        resetAll();
      }, sec * 1000);
    } else {
      statusText.textContent = "リセットしてください";
    }
  } else {
    if (continuousMode.checked) {
      setTimeout(function() {
        resetSecondOnly();
      }, sec * 1000);
    } else {
      statusText.textContent = "② 商品側をもう一度読み取ってください";
      processingLock = false;
      pauseUntil = 0;
    }
  }
}

function getScanConfig() {
  return {
    fps: 15,
    aspectRatio: 1.7778,
    qrbox: function(vw, vh) {
      const width = Math.floor(vw * 0.88);
      const height = 96;   // 横長バーコード専用の細い読み取り帯
      return { width: width, height: height };
    },
    rememberLastUsedCamera: true,
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E
    ]
  };
}

function debug(text) {
  debugBox.style.display = "none";
  debugBox.textContent = text;
}

async function startCamera() {
  if (cameraRunning) return;

  scanner = scanner || new Html5Qrcode("reader");
  startBtn.disabled = true;
  toggleCameraBtn.disabled = true;
  startBtn.textContent = "起動中...";
  statusText.textContent = "カメラを起動しています...";

  try {
    await scanner.start(
      { facingMode: "environment" },
      getScanConfig(),
      onScanSuccess,
      function() {}
    );

    cameraRunning = true;
    startBtn.textContent = "カメラ起動中";
    setStepUI();

  } catch (e) {
    console.error(e);
    startBtn.textContent = "カメラ開始";
    statusText.textContent = "カメラを起動できませんでした";
    alert("カメラを起動できませんでした。AndroidのChromeで開き、カメラ許可が『許可』になっているか確認してください。");
  } finally {
    startBtn.disabled = false;
    toggleCameraBtn.disabled = false;
  }
}

async function stopCamera() {
  if (!scanner || !cameraRunning) return;
  try {
    await scanner.stop();
  } catch (e) {
    console.error(e);
  }
  cameraRunning = false;
  startBtn.textContent = "カメラ開始";
  statusText.textContent = "カメラ停止中";
}

async function toggleCamera() {
  if (cameraRunning) {
    await stopCamera();
  } else {
    await startCamera();
  }
}

function acceptStableValue(value) {
  const now = Date.now();

  if (!isLikelyValidBarcode(value)) return;

  // 同じ値の再読防止
  if (value === lastAcceptedValue && now < blockSameUntil) return;

  // 一時停止中は無視
  if (now < pauseUntil) return;

  // 同じ値が連続で出た回数を数える
  if (value === candidateValue) {
    candidateCount += 1;
  } else {
    candidateValue = value;
    candidateCount = 1;
  }

  if (candidateCount < REQUIRED_STABLE_HITS) return;

  // 採用
  lastAcceptedValue = value;
  blockSameUntil = now + SAME_VALUE_BLOCK_MS;
  pauseUntil = now + ACCEPT_PAUSE_MS;
  resetReadStabilizer();

  if (scanStep === 1) {
    code1 = value;
    code1View.textContent = value;
    resultText.textContent = "1回目 OK";
    resultText.className = "big neutral";
    scanStep = 2;
    setStepUI();
    beep("scan");
    vibrate(60);
    return;
  }

  if (processingLock) return;

  code2 = value;
  code2View.textContent = value;

  const ok = code1 !== "" && code1 === code2;
  showResult(ok);
  afterCompare(ok);
}

function onScanSuccess(decodedText) {
  if (processingLock) return;

  const normalized = normalize(decodedText);
  acceptStableValue(normalized);
}

startBtn.addEventListener("click", startCamera);
toggleCameraBtn.addEventListener("click", toggleCamera);
resetBtn.addEventListener("click", resetAll);
exportBtn.addEventListener("click", exportHistoryCsv);
clearHistoryBtn.addEventListener("click", function(){
  if (confirm("履歴を削除しますか？")) {
    historySave([]);
    renderHistory();
  }
});

renderHistory();
setStepUI();
</script>
</body>
</html>
